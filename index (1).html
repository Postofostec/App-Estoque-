<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conferência de Estoque</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Barlow:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0d0f14;--surface:#161920;--surface-2:#1e2230;--border:#2a2f3f;
      --primary:#fca311;--primary-dim:#7a4e00;--success:#2ecc71;--danger:#e63946;
      --muted:#5a6070;--text:#e8eaf0;--text-dim:#8a90a0;
      --font-ui:'Barlow',sans-serif;--font-mono:'IBM Plex Mono',monospace;
      --radius-sm:6px;--radius:10px;--transition:180ms ease;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font-ui);background:var(--bg);color:var(--text);min-height:100dvh;line-height:1.5;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px}
    .app-wrapper{max-width:860px;margin:0 auto;padding:0 16px 100px}
    .app-header{position:sticky;top:0;z-index:100;background:rgba(13,15,20,0.93);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 16px;margin:0 -16px}
    .header-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
    .logo{height:36px;width:auto;object-fit:contain;flex-shrink:0}
    .app-title{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);flex:1}
    .header-file-label{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--primary);transition:var(--transition);white-space:nowrap}
    .header-file-label:hover{background:var(--primary-dim);border-color:var(--primary)}
    #csvInput{display:none}
    .search-wrap{position:relative}
    .search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
    #txtBusca{width:100%;padding:10px 12px 10px 38px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font-ui);font-size:14px;outline:none;transition:var(--transition)}
    #txtBusca:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(252,163,17,.12)}
    #txtBusca::placeholder{color:var(--muted)}
    .progress-section{padding:10px 0 0}
    .progress-track{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),#ffcc55);border-radius:2px;width:0%;transition:width 400ms ease}
    .progress-label{font-family:var(--font-mono);font-size:10px;color:var(--muted);display:block;text-align:right;margin-top:4px;min-height:14px}
    .toolbar{display:flex;gap:8px;padding:14px 0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
    .toolbar::-webkit-scrollbar{display:none}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text-dim);font-family:var(--font-ui);font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;white-space:nowrap;transition:var(--transition);user-select:none}
    .btn:hover{background:var(--surface-2);color:var(--text);border-color:#3a3f50}
    .btn:active{transform:scale(.97)}
    .btn--active{background:rgba(252,163,17,.12);border-color:var(--primary);color:var(--primary)}
    .btn--danger{border-color:rgba(230,57,70,.4);color:var(--danger)}
    .btn--danger:hover{background:rgba(230,57,70,.1);border-color:var(--danger)}
    .btn--export{border-color:rgba(252,163,17,.4);color:var(--primary);margin-left:auto;flex-shrink:0}
    .btn--export:hover{background:rgba(252,163,17,.1);border-color:var(--primary)}
    .btn-count{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:18px;padding:0 5px;background:var(--border);border-radius:10px;font-size:10px;font-family:var(--font-mono);color:var(--text-dim)}
    .btn--active .btn-count{background:rgba(252,163,17,.2);color:var(--primary)}
    #lista{display:flex;flex-direction:column;gap:6px}
    .produto-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;display:flex;align-items:center;gap:12px;transition:border-color var(--transition),background var(--transition);animation:cardIn 260ms both ease-out}
    @keyframes cardIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .produto-card:hover{border-color:#3a3f50;background:var(--surface-2)}
    .produto-info{flex:1;min-width:0}
    .produto-barra{font-family:var(--font-mono);font-size:11px;color:var(--primary);background:rgba(252,163,17,.1);border-radius:4px;padding:1px 6px;display:inline-block;margin-bottom:4px}
    .produto-nome{display:block;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.02em;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .produto-meta{display:flex;align-items:center;gap:8px;margin-top:5px;flex-wrap:wrap}
    .produto-id{font-family:var(--font-mono);font-size:10px;color:var(--muted)}
    .produto-saldo{font-size:11px;color:var(--text-dim)}
    .produto-saldo strong{color:var(--text);font-family:var(--font-mono)}
    .cat-badge{font-size:9px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:2px 7px;border-radius:10px}
    .cat-badge--oleo{background:rgba(252,163,17,.15);color:#fca311}
    .cat-badge--filtro{background:rgba(46,204,113,.15);color:#2ecc71}
    .cat-badge--vitrine{background:rgba(100,120,200,.15);color:#8a9ef0}
    .produto-acoes{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
    .input-contagem{width:84px;padding:8px 10px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font-mono);font-size:15px;font-weight:600;text-align:center;outline:none;transition:var(--transition);-moz-appearance:textfield}
    .input-contagem::-webkit-inner-spin-button,.input-contagem::-webkit-outer-spin-button{-webkit-appearance:none}
    .input-contagem:focus{border-color:var(--primary);background:var(--surface);box-shadow:0 0 0 3px rgba(252,163,17,.15)}
    .diff-badge{font-family:var(--font-mono);font-size:12px;font-weight:600;transition:color var(--transition);min-width:60px;text-align:right}
    .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:80px 20px;color:var(--muted);text-align:center}
    .empty-state p{font-size:14px;max-width:240px;line-height:1.6}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);padding:10px 20px;border-radius:var(--radius);font-size:13px;font-weight:700;opacity:0;pointer-events:none;transition:opacity 200ms,transform 200ms;z-index:999;white-space:nowrap}
    .toast--visible{opacity:1;transform:translateX(-50%) translateY(0)}
    .toast--success{background:var(--success);color:#fff}
    .toast--error{background:var(--danger);color:#fff}
    .toast--info{background:var(--surface-2);color:var(--text);border:1px solid var(--border)}
    @media(max-width:500px){.produto-nome{font-size:12px}.input-contagem{width:72px;font-size:14px}.btn{padding:8px 12px}}
  </style>
</head>
<body>
<div class="app-wrapper">
  <header class="app-header">
    <div class="header-row">
      <img src="Logo.jpg" alt="Logo" class="logo" onerror="this.style.display='none'">
      <span class="app-title">Conferência de Estoque</span>
      <label class="header-file-label" for="csvInput">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Importar CSV
      </label>
      <input type="file" id="csvInput" accept=".csv,.txt">
    </div>
    <div class="search-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="search" id="txtBusca" placeholder="Pesquisar produto ou código de barras…" autocomplete="off" spellcheck="false">
    </div>
    <div class="progress-section">
      <div class="progress-track"><div class="progress-fill" id="progressBar"></div></div>
      <span class="progress-label" id="progressLabel"></span>
    </div>
  </header>

  <nav class="toolbar">
    <button class="btn btn--active" data-categoria="todas">Todas <span class="btn-count" id="cnt-todas">0</span></button>
    <button class="btn" data-categoria="Óleo">Óleo <span class="btn-count" id="cnt-oleo">0</span></button>
    <button class="btn" data-categoria="Filtro">Filtro <span class="btn-count" id="cnt-filtro">0</span></button>
    <button class="btn" data-categoria="Vitrine">Vitrine <span class="btn-count" id="cnt-vitrine">0</span></button>
    <button class="btn" id="btnOrdenar">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 6h18M7 12h10M11 18h2"/></svg>
      <span id="lblOrdenar">Ordem: CSV</span>
    </button>
    <button class="btn btn--danger" id="btnReset">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
      Limpar
    </button>
    <button class="btn btn--export" id="btnExportar">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      Relatório PDF
    </button>
  </nav>

  <main><section id="lista"></section></main>
</div>

<div id="toast" class="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
<script>
const STORAGE_KEY='estoque_v2';
const State=(()=>{
  let s={produtos:[],filtro:'',ordenacao:'csv',categoriaAtiva:'todas'};
  const L=new Set();
  const notify=()=>L.forEach(fn=>fn(s));
  return{
    get:()=>s,
    set(p){s={...s,...p};notify()},
    subscribe:fn=>L.add(fn),
    persist(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(s.produtos))}catch(e){}},
    hydrate(){try{const r=localStorage.getItem(STORAGE_KEY);if(r){s.produtos=JSON.parse(r);notify()}}catch(e){}},
    clear(){localStorage.removeItem(STORAGE_KEY);s={...s,produtos:[],filtro:'',categoriaAtiva:'todas'};notify()}
  };
})();

const KF=['filtro','fitro','filtrante','elemento','psl','tecfil','vox','fram'];
const KO=['oil','fluido','aditivo','unilit','petronas','ipiranga','lubrax','shell','castrol','ypf','texaco','havoline','bardahl','radiex','elaion','agro','selenia','5w30','15w40','20w50','lubri','extron','deiton','evora','lynix','top auto'];

function identificarCategoria(nome){
  const n=nome.toLowerCase();
  if(KF.some(k=>n.includes(k)))return'Filtro';
  if(KO.some(k=>n.includes(k)))return'Óleo';
  return'Vitrine';
}

function parseBRFloat(v='0'){return parseFloat(String(v).replace(/\./g,'').replace(',','.'))||0}

function parseCSV(txt){
  const lines=txt.split('\n').filter(l=>l.trim()!=='');
  if(lines.length<2){showToast('CSV vazio ou inválido.','error');return[];}
  const sep=lines[0].includes(';')?';':',';
  const hdr=lines[0].split(sep).map(c=>c.trim().toLowerCase().replace(/['"]/g,''));
  const idx={
    nome:hdr.indexOf('des_item'),saldo:hdr.indexOf('qtd_saldo'),
    barra:hdr.indexOf('cod_barra'),codItem:hdr.indexOf('cod_item'),custo:hdr.indexOf('val_custo_unitario')
  };
  if(idx.nome===-1){showToast('Coluna "des_item" não encontrada.','error');return[];}
  return lines.slice(1).reduce((acc,line)=>{
    const c=line.split(sep);
    if(c.length<2)return acc;
    const nome=c[idx.nome]?.trim().replace(/['"]/g,'')||'Sem Nome';
    const barraRaw=idx.barra>=0?c[idx.barra]?.trim().replace(/['"]/g,''):'';
    const barra=barraRaw&&barraRaw.length>=4?barraRaw.slice(-4):barraRaw||'';
    acc.push({
      codItem:idx.codItem>=0?c[idx.codItem]?.trim().replace(/['"]/g,'')||'N/A':'N/A',
      nome,barra,
      saldo:idx.saldo>=0?parseBRFloat(c[idx.saldo]):0,
      custo:idx.custo>=0?parseBRFloat(c[idx.custo]):0,
      categoria:identificarCategoria(nome),contagem:null
    });
    return acc;
  },[]);
}

function selecionarProdutos(s){
  let l=[...s.produtos];
  if(s.categoriaAtiva!=='todas')l=l.filter(p=>p.categoria===s.categoriaAtiva);
  if(s.filtro){const t=s.filtro.toLowerCase();l=l.filter(p=>p.nome.toLowerCase().includes(t)||p.barra.includes(t));}
  if(s.ordenacao==='az')l.sort((a,b)=>a.nome.localeCompare(b.nome,'pt-BR'));
  return l;
}

function renderizarLista(s){
  const el=document.getElementById('lista');if(!el)return;
  const prods=selecionarProdutos(s);
  if(prods.length===0){
    el.innerHTML=`<div class="empty-state"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 7H4a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg><p>${s.produtos.length===0?'Importe um arquivo CSV para começar':'Nenhum produto encontrado'}</p></div>`;
    return;
  }
  const frag=document.createDocumentFragment();
  prods.forEach(p=>{
    const diff=p.contagem===null?null:p.contagem-p.saldo;
    const dTxt=diff===null?'—':diff>0?`+${diff.toFixed(2)}`:diff.toFixed(2);
    const cor=diff===null?'var(--muted)':diff<0?'var(--danger)':diff>0?'var(--success)':'var(--muted)';
    const catCls=`cat-badge cat-badge--${p.categoria.toLowerCase().replace('ó','o')}`;
    const ne=p.nome.replace(/"/g,'&quot;');
    const card=document.createElement('article');
    card.className='produto-card';
    card.innerHTML=`<div class="produto-info"><span class="produto-barra">${p.barra||'----'}</span><span class="produto-nome">${p.nome}</span><div class="produto-meta"><span class="produto-id">ID ${p.codItem}</span><span class="${catCls}">${p.categoria}</span><span class="produto-saldo">Sistema: <strong>${p.saldo.toFixed(2)}</strong></span></div></div><div class="produto-acoes"><input type="number" step="0.01" inputmode="decimal" placeholder="Qtd" class="input-contagem" value="${p.contagem===null?'':p.contagem}" data-nome="${ne}"><span class="diff-badge" style="color:${cor}">${dTxt}</span></div>`;
    frag.appendChild(card);
  });
  el.innerHTML='';el.appendChild(frag);
  atualizarContadores(s);atualizarProgresso(s);
}

function atualizarContadores(s){
  document.getElementById('cnt-todas').textContent=s.produtos.length;
  document.getElementById('cnt-oleo').textContent=s.produtos.filter(p=>p.categoria==='Óleo').length;
  document.getElementById('cnt-filtro').textContent=s.produtos.filter(p=>p.categoria==='Filtro').length;
  document.getElementById('cnt-vitrine').textContent=s.produtos.filter(p=>p.categoria==='Vitrine').length;
}

function atualizarProgresso(s){
  const total=s.produtos.length,contados=s.produtos.filter(p=>p.contagem!==null).length;
  const pct=total>0?Math.round((contados/total)*100):0;
  document.getElementById('progressBar').style.width=`${pct}%`;
  document.getElementById('progressLabel').textContent=total>0?`${contados}/${total} contados (${pct}%)`:'';
}

function atualizarDiffInline(nome,contagem,inputEl){
  const card=inputEl.closest('.produto-card');if(!card)return;
  const diffEl=card.querySelector('.diff-badge');
  const produto=State.get().produtos.find(p=>p.nome===nome);
  if(!diffEl||!produto)return;
  if(contagem===null){diffEl.textContent='—';diffEl.style.color='var(--muted)';return;}
  const d=contagem-produto.saldo;
  diffEl.textContent=d>0?`+${d.toFixed(2)}`:d.toFixed(2);
  diffEl.style.color=d<0?'var(--danger)':d>0?'var(--success)':'var(--muted)';
}

function gerarPDF(){
  if(!window.jspdf){showToast('jsPDF não carregou.','error');return;}
  const{jsPDF}=window.jspdf;
  const divs=State.get().produtos.filter(p=>p.contagem!==null).map(p=>({...p,dif:parseFloat((p.contagem-p.saldo).toFixed(2))})).filter(p=>p.dif!==0);
  if(divs.length===0){showToast('Nenhuma divergência encontrada!','info');return;}
  const doc=new jsPDF('l','mm','a4');
  const hoje=new Date().toLocaleDateString('pt-BR');
  const brl=v=>v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
  const tot=divs.reduce((s,p)=>s+p.dif*p.custo,0);
  doc.setFillColor(20,33,61);doc.rect(0,0,297,22,'F');
  doc.setTextColor(252,163,17);doc.setFontSize(14);doc.setFont('helvetica','bold');
  doc.text('RELATÓRIO DE DIVERGÊNCIAS — IMPACTO FINANCEIRO',14,14);
  doc.setTextColor(200,200,200);doc.setFontSize(9);doc.text(`Emitido em: ${hoje}`,230,14);
  doc.autoTable({
    head:[['Cód.','Produto','Custo Un.','Sistema','Contado','Diferença','Impacto R$']],
    body:divs.map(p=>[p.codItem,`[${p.barra}] ${p.nome}`,brl(p.custo),p.saldo.toFixed(2),p.contagem.toFixed(2),p.dif>0?`+${p.dif.toFixed(2)}`:p.dif.toFixed(2),brl(p.dif*p.custo)]),
    startY:26,headStyles:{fillColor:[20,33,61],textColor:[252,163,17],fontStyle:'bold'},
    alternateRowStyles:{fillColor:[245,245,245]},columnStyles:{1:{cellWidth:90}},
    foot:[['','','','','',{content:'TOTAL',styles:{fontStyle:'bold'}},{content:brl(tot),styles:{fontStyle:'bold',textColor:tot<0?[214,40,40]:[42,157,143]}}]],
    footStyles:{fillColor:[20,33,61],textColor:255}
  });
  doc.save(`divergencias-${hoje.replace(/\//g,'-')}.pdf`);
  showToast('PDF gerado!','success');
}

let _tt;
function showToast(msg,type='info'){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className=`toast toast--${type} toast--visible`;
  clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('toast--visible'),3000);
}

document.addEventListener('DOMContentLoaded',()=>{
  State.subscribe(s=>renderizarLista(s));
  State.hydrate();

  document.getElementById('csvInput').addEventListener('change',function(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const prods=parseCSV(ev.target.result);
      if(prods.length===0)return;
      State.set({produtos:prods});State.persist();
      showToast(`✓ ${prods.length} produtos importados!`,'success');
    };
    reader.onerror=()=>showToast('Erro ao ler arquivo.','error');
    reader.readAsText(file,'UTF-8');
  });

  document.getElementById('txtBusca').addEventListener('input',function(){State.set({filtro:this.value.trim()})});

  document.getElementById('btnOrdenar').addEventListener('click',function(){
    const nova=State.get().ordenacao==='csv'?'az':'csv';
    State.set({ordenacao:nova});
    this.classList.toggle('btn--active',nova==='az');
    document.getElementById('lblOrdenar').textContent=nova==='az'?'Ordem: A–Z':'Ordem: CSV';
  });

  document.getElementById('btnReset').addEventListener('click',()=>{
    if(!confirm('Apagar toda a contagem e recomeçar?'))return;
    State.clear();document.getElementById('csvInput').value='';showToast('Sistema limpo.','info');
  });

  document.getElementById('btnExportar').addEventListener('click',gerarPDF);

  document.querySelectorAll('[data-categoria]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      State.set({categoriaAtiva:btn.dataset.categoria});
      document.querySelectorAll('[data-categoria]').forEach(b=>b.classList.toggle('btn--active',b===btn));
    });
  });

  document.getElementById('lista').addEventListener('input',e=>{
    const inp=e.target;if(!inp.classList.contains('input-contagem'))return;
    const nome=inp.dataset.nome;
    const valor=inp.value===''?null:parseFloat(inp.value);
    const prods=State.get().produtos.map(p=>p.nome===nome?{...p,contagem:valor}:p);
    State.set({produtos:prods});State.persist();
    atualizarDiffInline(nome,valor,inp);
    atualizarProgresso(State.get());
  });

  renderizarLista(State.get());
});
</script>
</body>
</html>
