<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sistema de conferência de estoque">
  <title>Conferência de Estoque</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-wrapper">

  <!-- ── Header ──────────────────────────────────────────── -->
  <header class="app-header" role="banner">
    <div class="header-row">
      <img src="Logo.jpg" alt="Logo da empresa" class="logo">
      <span class="app-title">Conferência de Estoque</span>

      <label class="header-file-label" for="csvInput" title="Importar arquivo CSV">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" aria-hidden="true">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        Importar CSV
      </label>
      <input type="file" id="csvInput" accept=".csv" aria-label="Importar arquivo CSV">
    </div>

    <div class="search-wrap" role="search">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input
        type="search"
        id="txtBusca"
        placeholder="Pesquisar produto ou código de barras…"
        autocomplete="off"
        spellcheck="false"
        aria-label="Pesquisar produtos"
      >
    </div>

    <div class="progress-section" aria-live="polite">
      <div class="progress-track" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
        <div class="progress-fill" id="progressBar"></div>
      </div>
      <span class="progress-label" id="progressLabel"></span>
    </div>
  </header>

  <!-- ── Toolbar ─────────────────────────────────────────── -->
  <nav class="toolbar" role="toolbar" aria-label="Filtros e ações">

    <!-- Categoria: Todas -->
    <button class="btn" data-categoria="todas" aria-pressed="false">
      <span class="btn-label">Todas</span>
      <span class="btn-count" aria-label="total de produtos">0</span>
    </button>

    <!-- Categoria: Óleo -->
    <button class="btn" data-categoria="Óleo" aria-pressed="false">
      <span class="btn-label">Óleo</span>
      <span class="btn-count" aria-label="produtos de óleo">0</span>
    </button>

    <!-- Categoria: Filtro -->
    <button class="btn" data-categoria="Filtro" aria-pressed="false">
      <span class="btn-label">Filtro</span>
      <span class="btn-count" aria-label="produtos de filtro">0</span>
    </button>

    <!-- Categoria: Vitrine -->
    <button class="btn" data-categoria="Vitrine" aria-pressed="false">
      <span class="btn-label">Vitrine</span>
      <span class="btn-count" aria-label="produtos de vitrine">0</span>
    </button>

    <!-- Ordenação -->
    <button class="btn" id="btnOrdenar" title="Alternar ordenação">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5" aria-hidden="true">
        <path d="M3 6h18M7 12h10M11 18h2"/>
      </svg>
      <span class="btn-label">Ordem: CSV</span>
    </button>

    <!-- Reset -->
    <button class="btn btn--danger" id="btnReset" title="Limpar toda a contagem">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5" aria-hidden="true">
        <polyline points="1 4 1 10 7 10"/>
        <path d="M3.51 15a9 9 0 102.13-9.36L1 10"/>
      </svg>
      <span class="btn-label">Limpar</span>
    </button>

    <!-- Exportar PDF -->
    <button class="btn btn--export" id="btnExportar" title="Gerar relatório PDF">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5" aria-hidden="true">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
      <span class="btn-label">Relatório PDF</span>
    </button>

  </nav>

  <!-- ── Product List ────────────────────────────────────── -->
  <main>
    <section id="lista" aria-label="Lista de produtos" aria-live="polite"></section>
  </main>

</div>

<!-- ── Toast ───────────────────────────────────────────────── -->
<div id="toast" class="toast" role="status" aria-live="polite"></div>

<!-- ── Scripts ─────────────────────────────────────────────── -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

<!-- ES Modules -->
<script type="module" src="src/app.js"></script>

</body>
</html>
